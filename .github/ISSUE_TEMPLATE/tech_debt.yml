name: 🛠 Tech Debt / Refactor
description: Refactoring, internal improvements, debt to pay
title: '[TECH] '
labels: [ 'tech-debt', 'triage' ]
body:
  - type: textarea
    id: current
    attributes:
      label: Current state
      placeholder: |
        The transaction list screen re-renders the whole FlatList on every
        filter change, causing visible lag on older devices.
    validations:
      required: true

  - type: textarea
    id: proposed
    attributes:
      label: Proposed refactor
      placeholder: |
        Memoize list items, debounce filter input, consider FlashList.
    validations:
      required: true

  - type: textarea
    id: impact
    attributes:
      label: Impact / Risks
      description: Breaking changes? New deps? Files touched?

  - type: dropdown
    id: effort
    attributes:
      label: Estimated effort
      options:
        - S — < 2h
        - M — half a day
        - L — 1+ day
        - XL — multiple days, should be split
    validations:
      required: true

name: EAS Preview Build

on:
  pull_request:
    branches: [ release ]
    types: [ opened, synchronize, reopened ]

concurrency:
  group: eas-preview-${{ github.ref }}
  cancel-in-progress: true

jobs:
  preview:
    name: Build iOS Preview
    runs-on: ubuntu-latest
    # Gate: runs only when Apple Developer + EAS credentials are set up.
    # Set variable ENABLE_IOS_BUILDS=true in repo settings to enable.
    if: vars.ENABLE_IOS_BUILDS == 'true'
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - run: pnpm install --frozen-lockfile

      - name: Build iOS preview (internal distribution)
        run: eas build --profile preview --platform ios --non-interactive --no-wait
        env:
          EAS_BUILD_NO_EXPO_GO_WARNING: 'true'

      - name: Comment on PR
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: `🚀 **EAS Preview build queued**
            
                iOS build is queued on EAS. When ready, install via:
                - QR code: https://expo.dev/accounts/${{ vars.EXPO_ACCOUNT }}/projects/${{ vars.EXPO_PROJECT }}/builds
                - Or use Expo Go for quick testing
            
                _Build progress: check the EAS dashboard link above._`
            })

name: EAS Release Build

on:
  push:
    tags:
      - 'v*.*.*'

concurrency:
  group: eas-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Build & Submit to TestFlight
    runs-on: ubuntu-latest
    # Gate: set ENABLE_IOS_BUILDS=true in repo Variables to enable.
    if: vars.ENABLE_IOS_BUILDS == 'true'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - run: pnpm install --frozen-lockfile

      - name: Build iOS production
        run: eas build --profile production --platform ios --non-interactive --no-wait
        env:
          EAS_BUILD_NO_EXPO_GO_WARNING: 'true'

      - name: Submit to TestFlight
        if: vars.ENABLE_STORE_SUBMIT == 'true'
        run: eas submit --profile production --platform ios --latest --non-interactive
        env:
          EAS_BUILD_NO_EXPO_GO_WARNING: 'true'

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          generate_release_notes: true
          draft: false
          prerelease: false

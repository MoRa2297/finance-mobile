name: EAS Production Release

on:
  push:
    tags:
      - 'v*.*.*'

concurrency:
  group: eas-production
  cancel-in-progress: false

jobs:
  validate-tag:
    name: Validate tag is on release branch
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Check tag is on release branch
        run: |
          if ! git branch -r --contains ${{ github.ref }} | grep -q 'origin/release'; then
            echo "❌ Tag ${{ github.ref_name }} is not on the release branch"
            exit 1
          fi
          echo "✅ Tag is valid"

  build:
    name: Build iOS Production
    needs: validate-tag
    runs-on: ubuntu-latest
    environment:
      name: production
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - run: pnpm install --frozen-lockfile

      - name: Build iOS production
        id: build
        run: |
          if [ "${{ vars.ENABLE_STORE_SUBMIT }}" = "true" ]; then
            echo "Store submit ENABLED — building with --auto-submit"
            eas build --profile production --platform ios --non-interactive --auto-submit
          else
            echo "Store submit DISABLED — building only (no TestFlight submit)"
            eas build --profile production --platform ios --non-interactive
          fi

  github-release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate changelog
        id: changelog
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 ${{ github.ref }}^ 2>/dev/null || echo "")
          if [ -z "$PREV_TAG" ]; then
            LOG=$(git log --pretty=format:"- %s (%h)" ${{ github.ref }})
          else
            LOG=$(git log --pretty=format:"- %s (%h)" ${PREV_TAG}..${{ github.ref }})
          fi
          {
            echo "changelog<<EOF"
            echo "$LOG"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          body: |
            ## Changes
            ${{ steps.changelog.outputs.changelog }}

            ## Build
            iOS build is queued on EAS.

            📱 Download / install: https://expo.dev/accounts/${{ vars.EXPO_ACCOUNT }}/projects/${{ vars.EXPO_PROJECT }}/builds

            > Store submission is ${{ vars.ENABLE_STORE_SUBMIT == 'true' && 'enabled' || 'disabled' }}.
          draft: false
          prerelease: false
